# Free email digest — a Clareon-style "new settlements" briefing.
#
# Runs Mon/Wed/Fri morning, builds a ranked digest of every settlement added
# since the last run, and emails it via Gmail SMTP (Python stdlib, no deps).
# Needs three repo secrets: SMTP_USER (your Gmail), SMTP_PASS (a Gmail app
# password), DIGEST_TO (recipients — comma-separate for more than one).
#
# To send a TEST email anytime (e.g. after adding a recipient): Actions tab ->
# "Email settlement digest" -> Run workflow -> leave "test_days" at 7 -> Run.
# That forces a sample looking back 7 days, even if nothing is new.
name: Email settlement digest

on:
  schedule:
    - cron: "23 13 * * 1,3,5"    # Mon/Wed/Fri 13:23 UTC (~9:23am ET). Deliberately
                                 # OFF the top of the hour — GitHub's free scheduler
                                 # drops/delays on-the-hour crons under load.
  workflow_dispatch:
    inputs:
      test_days:
        description: "Test send: look back this many days (forces a sample). Blank = only what's new."
        required: false
        default: "7"

permissions:
  contents: write                 # to commit digest_state.json (last-run marker)

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and email the digest
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.test_days }}" ]; then
            echo "Manual test send — looking back ${{ github.event.inputs.test_days }} days"
            python server.py --digest --days "${{ github.event.inputs.test_days }}"
          else
            python server.py --digest
          fi

      - name: Save last-run marker
        run: |
          git config user.name  "settlesearch-bot"
          git config user.email "settlesearch-bot@users.noreply.github.com"
          git add digest_state.json
          if git diff --staged --quiet; then
            echo "No state change."
          else
            git commit -m "Update digest state [skip ci]"
            git push
          fi
